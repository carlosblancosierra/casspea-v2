<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}CassPea{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Inter Font Integration -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">

    <style>
        /* Reset Styles */
        body, table, td, a {
            -webkit-text-size-adjust: 100%;
            -ms-text-size-adjust: 100%;
        }
        table, td {
            mso-table-lspace: 0pt;
            mso-table-rspace: 0pt;
        }
        img {
            -ms-interpolation-mode: bicubic;
        }

        /* Inter Font Class */
        .inter-custom {
            font-family: "Inter", sans-serif;
            font-optical-sizing: auto;
            font-weight: 400;
            font-style: normal;
        }

        /* General Styles */
        body {
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            font-family: Arial, sans-serif; /* Fallback font */
        }
        .container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            background-color: #ffffff;
        }
        .header {
            background: linear-gradient(135deg, #4f46e5 0%, #817df5 100%);
            padding: 20px;
            text-align: center;
            color: #ffffff;
        }
        .header img {
            width: 150px;
            height: auto;
            display: block;
            margin: 0 auto;
        }
        .hero {
            background-color: #4f46e5;
            padding: 40px 20px;
            text-align: center;
            color: #ffffff;
        }
        .hero h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        .hero p {
            font-size: 16px;
            margin-bottom: 20px;
        }
        .button, .hero .button {
            background-color: #ffffff;
            color: #4f46e5;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }
        .content {
            padding: 20px;
            color: #333333;
        }
        .content h2 {
            font-size: 22px;
            margin-bottom: 10px;
            color: #4f46e5;
        }
        .content p {
            font-size: 16px;
            margin-bottom: 10px;
            line-height: 1.5;
        }
        .discount-code {
            background-color: #eef2ff;
            border-left: 5px solid #4f46e5;
            padding: 10px 15px;
            margin: 15px 0;
            font-size: 16px;
            font-weight: bold;
            color: #4f46e5;
        }
        .order-summary {
            margin-top: 20px;
            border-top: 1px solid #dddddd;
            padding-top: 20px;
        }
        .order-summary table {
            width: 100%;
            border-collapse: collapse;
        }
        .order-summary th, .order-summary td {
            text-align: left;
            padding: 8px 0;
        }
        .order-summary th {
            font-weight: bold;
            color: #4f46e5;
        }
        .footer {
            background-color: #f4f4f4;
            padding: 20px;
            text-align: center;
            color: #777777;
            font-size: 12px;
        }
        .footer a {
            color: #4f46e5;
            text-decoration: none;
        }

        /* Responsive Styles */
        @media only screen and (max-width: 600px) {
            .container {
                width: 100% !important;
            }
            .header img {
                width: 100px;
            }
            .hero h1 {
                font-size: 24px;
            }
            .hero p, .content p {
                font-size: 14px;
            }
            .button, .hero .button {
                padding: 10px 20px;
                font-size: 14px;
            }
        }
    </style>
    {% block head_extra %}{% endblock %}
</head>
<body>
    <div class="container inter-custom">
        <!-- Header Section -->
        <div class="header">
            <a href="https://www.casspea.co.uk/" style="text-decoration: none;">
                <img src="https://www.casspea.co.uk/static/images/logo-gray.png" alt="CassPea Logo" style="display: block; margin: 0 auto;">
            </a>
        </div>

        <!-- Hero Section -->
        <div class="hero">
            {% block hero %}
            <!-- Default Hero Content -->
            <h1>Welcome!</h1>
            <p>We're glad to have you with us.</p>
            {% endblock %}
        </div>

        <!-- Content Section -->
        <div class="content">
            {% block content %}
            <!-- Default Content -->
            {% endblock %}
        </div>

        <!-- Footer Section -->
        <div class="footer">
            <p>&copy; {{ current_year }} CassPea. All rights reserved.</p>
            <p>You are receiving this email because you made a purchase with us.</p>
            <p><a href="https://www.casspea.co.uk/unsubscribe/">Unsubscribe</a></p>
        </div>
    </div>
</body>
</html>
